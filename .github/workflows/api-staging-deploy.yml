name: API - Deploy Staging to Azure

on:
  push:
    branches:
      - staging
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  DOTNET_VERSION: '10.0.x'
  API_PROJECT_PATH: '.'
  API_CSPROJ_PATH: './simplebiztoolkit-api.csproj'
  AZURE_WEBAPP_NAME: 'simplebiztoolkit-api-test'
  PUBLISH_PATH: './publish'

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore "${{ env.API_CSPROJ_PATH }}"

      - name: Build
        run: dotnet build "${{ env.API_CSPROJ_PATH }}" --configuration Release --no-restore

      - name: Detect test projects
        id: test_projects
        shell: bash
        run: |
          count=$(find "${{ env.API_PROJECT_PATH }}" -type f \( -name "*Tests.csproj" -o -name "*.Tests.csproj" -o -name "*Test.csproj" -o -name "*.Test.csproj" \) | wc -l)
          echo "count=$count" >> $GITHUB_OUTPUT

      - name: Run tests
        if: steps.test_projects.outputs.count != '0'
        run: dotnet test "${{ env.API_CSPROJ_PATH }}" --configuration Release --no-build --verbosity normal

      - name: Publish
        run: dotnet publish "${{ env.API_CSPROJ_PATH }}" --configuration Release --no-build --output "${{ env.PUBLISH_PATH }}"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: ${{ env.PUBLISH_PATH }}
