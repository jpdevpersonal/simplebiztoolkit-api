name: API - Staging PR Validation

on:
  pull_request:
    branches:
      - staging
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

env:
  DOTNET_VERSION: '10.0.x' # change if your API targets a different SDK
  API_PROJECT_FILE: 'simplebiztoolkit-api/simplebiztoolkit-api.csproj'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore "${{ env.API_PROJECT_FILE }}"

      - name: Build
        run: dotnet build "${{ env.API_PROJECT_FILE }}" --configuration Release --no-restore

      - name: Detect test projects
        id: test_projects
        shell: bash
        run: |
          mapfile -t tests < <(find . -type f \( -name "*Tests.csproj" -o -name "*.Tests.csproj" -o -name "*Test.csproj" -o -name "*.Test.csproj" \) | sort)
          printf '%s\n' "${tests[@]}" > /tmp/test-projects.txt
          echo "count=${#tests[@]}" >> $GITHUB_OUTPUT

      - name: Run tests
        if: steps.test_projects.outputs.count != '0'
        shell: bash
        run: |
          while IFS= read -r test_project; do
            dotnet test "$test_project" --configuration Release --no-build --verbosity normal
          done < /tmp/test-projects.txt
